<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訪談時間選擇</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; max-width: 520px; margin: 0 auto; padding: 0 0 40px; }
.header { padding: 24px 24px 16px; border-bottom: 1px solid #eee; }
.header h1 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
.header .sub { font-size: 13px; color: #888; margin-bottom: 12px; }
.meta { display: flex; flex-wrap: wrap; gap: 12px; }
.meta-item { font-size: 12px; color: #666; }
.body { padding: 20px 24px; }
.intro { font-size: 13px; color: #555; margin-bottom: 20px; line-height: 1.6; }
.day-group { margin-bottom: 18px; }
.day-label { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.slots { display: flex; flex-wrap: wrap; gap: 8px; }
.slot { padding: 9px 18px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 13px; cursor: pointer; user-select: none; transition: all .15s; background: #fff; }
.slot:hover { border-color: #7C6EF0; background: #F5F3FF; }
.slot.selected { border-color: #534AB7; background: #EEEDFE; color: #26215C; font-weight: 500; }
.slot.disabled { opacity: .35; pointer-events: none; }
.counter { font-size: 12px; color: #888; margin-top: 8px; }
.counter b { color: #111; }
.footer { padding: 0 24px; }
.btn { width: 100%; padding: 11px; font-size: 14px; font-weight: 500; border: none; border-radius: 8px; cursor: pointer; background: #534AB7; color: #fff; transition: opacity .15s; }
.btn:disabled { opacity: .35; cursor: not-allowed; }
.btn:not(:disabled):hover { opacity: .88; }
.success { margin-top: 14px; padding: 14px 16px; background: #f5f5f5; border-radius: 8px; font-size: 13px; display: none; }
.success.show { display: block; }
.success strong { display: block; margin-bottom: 8px; }
.success ul { padding-left: 16px; line-height: 2; color: #444; }
.thanks { margin-top: 10px; font-size: 12px; color: #999; line-height: 1.7; }
</style>
</head>
<body>
<div class="header">
  <h1>訪談時間選擇</h1>
  <div class="meta">
    <div class="meta-item">⏱ 60 分鐘</div>
    <div class="meta-item">🎥 Google Meet 線上訪談</div>
    <div class="meta-item">👤 Angela Tsai、Michael Palmer</div>
  </div>
</div>
<div class="body">
  <p class="intro">請選擇 1–3 個方便的時段，我們將盡快確認最終時間。</p>

  <div class="day-group">
    <div class="day-label">週一 · 6/1</div>
    <div class="slots">
      <div class="slot" data-label="6/1（週一）11:00–12:00" onclick="toggle(this)">11:00–12:00</div>
      <div class="slot" data-label="6/1（週一）12:00–13:00" onclick="toggle(this)">12:00–13:00</div>
    </div>
  </div>

  <div class="day-group">
    <div class="day-label">週三 · 6/3</div>
    <div class="slots">
      <div class="slot" data-label="6/3（週三）16:00–17:00" onclick="toggle(this)">16:00–17:00</div>
      <div class="slot" data-label="6/3（週三）17:00–18:00" onclick="toggle(this)">17:00–18:00</div>
    </div>
  </div>

  <div class="day-group">
    <div class="day-label">週四 · 6/4</div>
    <div class="slots">
      <div class="slot" data-label="6/4（週四）11:00–12:00" onclick="toggle(this)">11:00–12:00</div>
      <div class="slot" data-label="6/4（週四）15:00–16:00" onclick="toggle(this)">15:00–16:00</div>
      <div class="slot" data-label="6/4（週四）16:00–17:00" onclick="toggle(this)">16:00–17:00</div>
    </div>
  </div>

  <div class="day-group">
    <div class="day-label">週五 · 6/5</div>
    <div class="slots">
      <div class="slot" data-label="6/5（週五）16:00–17:00" onclick="toggle(this)">16:00–17:00</div>
    </div>
  </div>

  <p class="counter">已選 <b id="cnt">0</b> / 3 個時段</p>
</div>
<div class="footer">
  <button class="btn" id="submitBtn" disabled onclick="submit()">確認送出</button>
  <div class="success" id="success">
    <strong>✅ 感謝您的選擇！</strong>
    <ul id="selectedList"></ul>
    <p class="thanks">我們將在一個工作天內寄送確認信至您的信箱。</p>
  </div>
</div>
<script>
let selected = [];
function toggle(el) {
  const label = el.dataset.label;
  if (el.classList.contains('selected')) {
    el.classList.remove('selected');
    selected = selected.filter(s => s !== label);
  } else {
    if (selected.length >= 3) return;
    el.classList.add('selected');
    selected.push(label);
  }
  document.getElementById('cnt').textContent = selected.length;
  document.getElementById('submitBtn').disabled = selected.length === 0;
}
function submit() {
  const list = document.getElementById('selectedList');
  list.innerHTML = selected.map(s => `<li>${s}（台灣時間 UTC+8）</li>`).join('');
  document.getElementById('success').classList.add('show');
  document.getElementById('submitBtn').disabled = true;
  document.querySelectorAll('.slot').forEach(s => s.classList.add('disabled'));
}
</script>
</body>
</html>
